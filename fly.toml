app = "gymbrain-api"
primary_region = "bom"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["app"]

# Celery worker process
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  processes = ["worker"]

[processes]
  app = "sh -c 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --loop uvloop'"
  worker = "celery -A app.tasks.worker.celery_app worker --loglevel=info -Q default,notifications,analytics,email --concurrency=2"
